<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCAP Operations 9.0 — Interactive Practice Exam</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --border: #475569; --text: #e2e8f0; --text2: #94a3b8;
    --accent: #3b82f6; --accent-hover: #2563eb;
    --green: #22c55e; --green-bg: #052e16; --green-border: #166534;
    --red: #ef4444; --red-bg: #2a0a0a; --red-border: #991b1b;
    --orange: #f59e0b; --orange-bg: #1a1200; --orange-border: #92400e;
    --priority: #ef4444; --strength: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .header { background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); border-bottom: 2px solid var(--accent); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .header h1 { font-size: 1.4rem; color: white; }
  .header h1 span { color: var(--accent); }
  .header-stats { display: flex; gap: 20px; font-size: 0.9rem; color: var(--text2); }
  .header-stats .stat { display: flex; align-items: center; gap: 6px; }
  .header-stats .stat b { color: var(--text); }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  .setup { background: var(--surface); border-radius: 12px; padding: 30px; }
  .setup h2 { margin-bottom: 20px; font-size: 1.3rem; }
  .filter-group { margin-bottom: 24px; }
  .filter-group h3 { color: var(--accent); font-size: 1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .filter-group h3 .badge { font-size: 0.75rem; background: var(--accent); color: white; padding: 2px 8px; border-radius: 10px; }
  .section-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 8px; }
  .section-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface2); border-radius: 8px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
  .section-item:hover { border-color: var(--accent); }
  .section-item.selected { border-color: var(--accent); background: rgba(59,130,246,0.1); }
  .section-item input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
  .section-item label { cursor: pointer; flex: 1; font-size: 0.85rem; }
  .section-item .count { color: var(--text2); font-size: 0.8rem; white-space: nowrap; }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .priority-dot.red { background: var(--priority); }
  .priority-dot.green { background: var(--strength); }
  .priority-dot.blue { background: var(--accent); }
  .setup-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 20px; }
  .setup-actions .info { color: var(--text2); font-size: 0.85rem; }
  .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; font-weight: 600; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-small { padding: 6px 14px; font-size: 0.82rem; }
  .quick-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .toggle-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .toggle { position: relative; width: 44px; height: 24px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider { position: absolute; inset: 0; background: var(--surface2); border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid var(--border); }
  .toggle .slider:before { content: ''; position: absolute; height: 18px; width: 18px; left: 2px; bottom: 2px; background: var(--text2); border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .slider { background: var(--accent); border-color: var(--accent); }
  .toggle input:checked + .slider:before { transform: translateX(20px); background: white; }
  .question-card { background: var(--surface); border-radius: 12px; padding: 28px; margin-bottom: 20px; border: 1px solid var(--surface2); }
  .question-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .question-num { font-size: 0.82rem; color: var(--text2); }
  .question-section { font-size: 0.78rem; padding: 3px 10px; border-radius: 12px; }
  .question-section.priority { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .question-section.strength { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .question-text { font-size: 1.05rem; font-weight: 500; margin-bottom: 18px; line-height: 1.5; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; background: var(--surface2); border: 2px solid transparent; border-radius: 10px; cursor: pointer; transition: all 0.15s; }
  .option:hover:not(.disabled) { border-color: var(--accent); background: rgba(59,130,246,0.05); }
  .option.selected { border-color: var(--accent); background: rgba(59,130,246,0.1); }
  .option.correct { border-color: var(--green); background: var(--green-bg); }
  .option.incorrect { border-color: var(--red); background: var(--red-bg); }
  .option.was-correct { border-color: var(--green); border-style: dashed; }
  .option.disabled { cursor: default; }
  .option-letter { width: 28px; height: 28px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; flex-shrink: 0; color: var(--text2); }
  .option.selected .option-letter { background: var(--accent); color: white; }
  .option.correct .option-letter { background: var(--green); color: white; }
  .option.incorrect .option-letter { background: var(--red); color: white; }
  .option-text { font-size: 0.92rem; padding-top: 3px; }
  .explanation { margin-top: 16px; padding: 14px 18px; border-radius: 10px; font-size: 0.88rem; line-height: 1.5; display: none; }
  .explanation.correct { background: var(--green-bg); border: 1px solid var(--green-border); color: #bbf7d0; }
  .explanation.incorrect { background: var(--red-bg); border: 1px solid var(--red-border); color: #fecaca; }
  .explanation.show { display: block; }
  .explanation strong { color: var(--green); }
  .explanation.incorrect strong { color: var(--red); }
  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .progress { display: flex; align-items: center; gap: 12px; }
  .progress-bar { width: 200px; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
  .progress-text { font-size: 0.85rem; color: var(--text2); }
  .nav-buttons { display: flex; gap: 8px; }
  .score-card { background: var(--surface); border-radius: 12px; padding: 30px; text-align: center; }
  .score-card h2 { font-size: 1.5rem; margin-bottom: 20px; }
  .score-big { font-size: 4rem; font-weight: 800; margin: 10px 0; }
  .score-big.pass { color: var(--green); }
  .score-big.fail { color: var(--red); }
  .score-detail { color: var(--text2); margin-bottom: 20px; font-size: 1rem; }
  .score-breakdown { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin: 24px 0; text-align: left; }
  .score-section { background: var(--surface2); padding: 12px 16px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
  .score-section .name { font-size: 0.82rem; flex: 1; }
  .score-section .result { font-weight: 700; font-size: 0.9rem; }
  .score-section .result.good { color: var(--green); }
  .score-section .result.bad { color: var(--red); }
  .score-section .result.ok { color: var(--orange); }
  .q-map { display: flex; flex-wrap: wrap; gap: 6px; margin: 20px 0; justify-content: center; }
  .q-dot { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); }
  .q-dot.answered { background: var(--accent); color: white; border-color: var(--accent); }
  .q-dot.correct-dot { background: var(--green); color: white; border-color: var(--green); }
  .q-dot.incorrect-dot { background: var(--red); color: white; border-color: var(--red); }
  .q-dot.current { box-shadow: 0 0 0 2px var(--accent), 0 0 0 4px rgba(59,130,246,0.3); }
  .q-dot:hover { transform: scale(1.1); }
  @media (max-width: 640px) {
    .header { padding: 14px 16px; }
    .container { padding: 12px; }
    .question-card { padding: 18px; }
    .section-list { grid-template-columns: 1fr; }
    .score-big { font-size: 3rem; }
    .progress-bar { width: 120px; }
  }
  .hidden { display: none !important; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
  
  .question-section.section-default { background: rgba(59,130,246,0.1); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); }
  .priority-dot.blue { background: var(--accent); }

</style>
</head>
<body>

<div class="header">
  <h1>VCAP Operations 9.0 <span>(3V0-22.25)</span> — Practice Exam</h1>
  <div class="header-stats" id="headerStats">
    
  </div>
</div>

<div class="container">
  <div id="setupScreen" class="setup">
    <h2>Configure Your Practice Session</h2>
    <div class="quick-btns">
      <button class="btn btn-secondary btn-small" onclick="selectAll()">Select All</button>
      <button class="btn btn-secondary btn-small" onclick="selectNone()">Deselect All</button>
      
    </div>
    <div id="filterGroups"></div>
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="randomizeToggle" checked>
        <span class="slider"></span>
      </label>
      <span style="font-size:0.9rem;">Randomize question order</span>
    </div>
    <div class="setup-actions">
      <button class="btn btn-primary" id="startBtn" onclick="startExam()">Start Practice Exam</button>
      <span class="info" id="selectedCount">0 questions selected</span>
    </div>
  </div>

  <div id="examScreen" class="hidden">
    <div class="nav-bar">
      <div class="progress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-text" id="progressText">0 / 0</span>
        <span class="progress-text" style="color:var(--green)" id="scoreRunning"></span>
      </div>
      <div class="nav-buttons">
        <button class="btn btn-secondary btn-small" onclick="prevQuestion()">&larr; Prev</button>
        <button class="btn btn-secondary btn-small" onclick="nextQuestion()">Next &rarr;</button>
        <button class="btn btn-primary btn-small" id="finishBtn" onclick="finishExam()">Finish Exam</button>
      </div>
    </div>
    <div class="q-map" id="questionMap"></div>
    <div id="questionContainer"></div>
  </div>

  <div id="resultsScreen" class="hidden">
    <div class="score-card">
      <h2>Exam Results</h2>
      <div class="score-big" id="scoreBig">0%</div>
      <div class="score-detail" id="scoreDetail"></div>
      <div class="score-breakdown" id="scoreBreakdown"></div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="reviewExam()">Review Answers</button>
        <button class="btn btn-secondary" onclick="retryWrong()">Retry Wrong Answers</button>
        <button class="btn btn-secondary" onclick="resetExam()">New Session</button>
      </div>
    </div>
  </div>

  <div id="reviewScreen" class="hidden">
    <div class="nav-bar">
      <div class="progress">
        <span class="progress-text" id="reviewTitle" style="font-weight:600;color:var(--text)">Review Mode</span>
        <span class="progress-text" id="reviewFilter">
          <button class="btn btn-secondary btn-small" onclick="filterReview('all')" style="margin-left:12px">All</button>
          <button class="btn btn-secondary btn-small" onclick="filterReview('wrong')">Wrong Only</button>
          <button class="btn btn-secondary btn-small" onclick="filterReview('correct')">Correct Only</button>
        </span>
      </div>
      <button class="btn btn-secondary btn-small" onclick="backToResults()">Back to Results</button>
    </div>
    <div id="reviewContainer"></div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [{"section": "4.1 \u2013 Day 2 Tasks & Operational Readiness", "question": "Which self-monitoring metric indicates that a Collector node is falling behind in metric ingestion?", "options": ["Collector throughput < 50 events/sec", "Collector backlog > 10,000 events", "Analytics heap utilization > 50%", "UI response time > 5000ms"], "correct": 1, "explanation": "Correct answer: B. Collector backlog exceeding 10,000 events indicates the collector cannot keep up with incoming metrics and may require horizontal scaling.", "priority": true, "sectionClean": "4.1 \u2013 Day 2 Tasks & Operational Readiness"}, {"section": "4.1 \u2013 Day 2 Tasks & Operational Readiness", "question": "VCF Operations has replaced which legacy VMware monitoring product?", "options": ["vRealize Operations Manager (vROps)", "vRealize Network Insight (vRNI)", "vRealize Log Insight", "vRealize Automation"], "correct": 0, "explanation": "Correct answer: A. VCF Operations is the successor to Aria Operations / vRealize Operations Manager.", "priority": true, "sectionClean": "4.1 \u2013 Day 2 Tasks & Operational Readiness"}, {"section": "4.1 \u2013 Day 2 Tasks & Operational Readiness", "question": "What is the maximum number of objects (VMs, hosts, networks) a single VCF Operations Collector can monitor?", "options": ["50,000 objects", "100,000 objects", "150,000 objects", "200,000 objects"], "correct": 1, "explanation": "Correct answer: B. Each Collector node can handle up to 100,000 objects. Larger deployments require multiple regional collectors.", "priority": true, "sectionClean": "4.1 \u2013 Day 2 Tasks & Operational Readiness"}, {"section": "4.1 \u2013 Day 2 Tasks & Operational Readiness", "question": "Configuration Drift detection in VCF 9.0 monitors which of the following? (Select 3)", "options": ["Host firmware versions", "vSAN policy compliance", "DRS rule configurations", "VM shutdown schedules"], "correct": 2, "explanation": "Correct answer: A, B, C are all monitored. Configuration Drift tracks firmware, policies, and rules but not VM shutdown schedules.", "priority": true, "sectionClean": "4.1 \u2013 Day 2 Tasks & Operational Readiness"}, {"section": "4.1 \u2013 Day 2 Tasks & Operational Readiness", "question": "Which identity protocol does VCF Identity Broker support that enables passwordless authentication?", "options": ["RADIUS", "LDAP with multi-factor", "FIDO2 (WebAuthn)", "Kerberos"], "correct": 2, "explanation": "Correct answer: C. VCF Identity Broker supports FIDO2/WebAuthn for passwordless, hardware-token authentication.", "priority": true, "sectionClean": "4.1 \u2013 Day 2 Tasks & Operational Readiness"}, {"section": "4.2 \u2013 Capacity Management & Sizing", "question": "What is the recommended capacity headroom for a vSAN cluster to allow for rebuild operations?", "options": ["15% free capacity", "20% free capacity", "30% free capacity", "40% free capacity"], "correct": 2, "explanation": "Correct answer: C. vSAN requires minimum 30% free capacity for rebuild and rebalancing operations.", "priority": true, "sectionClean": "4.2 \u2013 Capacity Management & Sizing"}, {"section": "4.2 \u2013 Capacity Management & Sizing", "question": "When CPU utilization exceeds 80% for a sustained period, what is the typical next step in capacity planning?", "options": ["Immediately add more hosts", "Analyze workload patterns and forecast growth", "Disable DRS optimization", "Reduce VM memory allocations"], "correct": 1, "explanation": "Correct answer: B. Analyze patterns first using 30-day trends and forecasting before expanding.", "priority": true, "sectionClean": "4.2 \u2013 Capacity Management & Sizing"}, {"section": "4.2 \u2013 Capacity Management & Sizing", "question": "What does VMX overhead per vCPU typically consume in memory?", "options": ["30-50 MB", "60-100 MB", "150-200 MB", "250-300 MB"], "correct": 1, "explanation": "Correct answer: B. VMX overhead is typically 60-100 MB per vCPU allocated to a VM.", "priority": true, "sectionClean": "4.2 \u2013 Capacity Management & Sizing"}, {"section": "4.2 \u2013 Capacity Management & Sizing", "question": "In a 10 Gigabit network, what is the approximate usable bandwidth for traffic (accounting for overhead)?", "options": ["10 Gbps", "9.6 Gbps", "8.5 Gbps", "7.0 Gbps"], "correct": 1, "explanation": "Correct answer: B. 10 Gigabit NIC typically provides ~9.6 Gbps usable bandwidth.", "priority": true, "sectionClean": "4.2 \u2013 Capacity Management & Sizing"}, {"section": "4.2 \u2013 Capacity Management & Sizing", "question": "Which forecasting method does VCF Operations use for capacity trend analysis?", "options": ["Linear regression", "Exponential smoothing with Holt-Winters", "Simple moving average", "Kalman filtering"], "correct": 1, "explanation": "Correct answer: B. Exponential smoothing with Holt-Winters accounts for seasonal patterns in capacity.", "priority": true, "sectionClean": "4.2 \u2013 Capacity Management & Sizing"}, {"section": "4.3 \u2013 Forecast Capacity Growth", "question": "What is the typical confidence level for a 90-day capacity forecast?", "options": ["95%", "85%", "70%", "60%"], "correct": 2, "explanation": "Correct answer: C. 90-day forecasts typically have ~70% confidence; longer horizons are less reliable.", "priority": true, "sectionClean": "4.3 \u2013 Forecast Capacity Growth"}, {"section": "4.3 \u2013 Forecast Capacity Growth", "question": "Which component of seasonal decomposition represents the underlying long-term change?", "options": ["Base", "Trend", "Seasonal", "Residual"], "correct": 1, "explanation": "Correct answer: B. Trend captures the overall growth direction; seasonal captures repeated patterns.", "priority": true, "sectionClean": "4.3 \u2013 Forecast Capacity Growth"}, {"section": "4.3 \u2013 Forecast Capacity Growth", "question": "When should baseline data be excluded from capacity forecasting calculations?", "options": ["First 7 days", "First 14 days", "First 30 days", "First 60 days"], "correct": 1, "explanation": "Correct answer: B. Initial 14-day window is excluded due to post-deployment artifacts and stabilization.", "priority": true, "sectionClean": "4.3 \u2013 Forecast Capacity Growth"}, {"section": "4.3 \u2013 Forecast Capacity Growth", "question": "Which forecasting method allows you to account for both growth acceleration and deceleration?", "options": ["Linear regression", "Moving average", "Polynomial fitting", "Exponential smoothing"], "correct": 2, "explanation": "Correct answer: C. Polynomial fitting (quadratic, cubic) captures non-linear growth patterns.", "priority": true, "sectionClean": "4.3 \u2013 Forecast Capacity Growth"}, {"section": "4.3 \u2013 Forecast Capacity Growth", "question": "What technique is used in VCF Operations to remove backup windows and maintenance spikes from forecast data?", "options": ["Data smoothing", "Anomaly filtering", "Baseline adjustment", "Confidence adjustment"], "correct": 1, "explanation": "Correct answer: B. Anomaly filtering identifies and removes outliers before model training.", "priority": true, "sectionClean": "4.3 \u2013 Forecast Capacity Growth"}, {"section": "4.4 \u2013 Cost Management & Chargeback", "question": "In a chargeback model, how is compute cost typically calculated?", "options": ["Fixed cost per VM regardless of size", "vCPU count \u00d7 CPU rate/hr + Memory GB \u00d7 Memory rate/hr", "Total cluster cost \u00f7 number of VMs", "Annual license cost \u00f7 12 \u00f7 number of VMs"], "correct": 1, "explanation": "Correct answer: B. Consumption-based model charges per vCPU and per GB of allocated memory.", "priority": true, "sectionClean": "4.4 \u2013 Cost Management & Chargeback"}, {"section": "4.4 \u2013 Cost Management & Chargeback", "question": "Storage deduplication and compression savings should be reflected in chargeback by:", "options": ["Ignoring them (charge for full provisioned capacity)", "Applying a reduction factor to storage rates", "Applying an increase factor to reward efficiency", "Removing the VM from chargeback calculations"], "correct": 1, "explanation": "Correct answer: B. Dedup/compression savings reduce chargeback burden; e.g., 50% dedup = 50% cost reduction.", "priority": true, "sectionClean": "4.4 \u2013 Cost Management & Chargeback"}, {"section": "4.4 \u2013 Cost Management & Chargeback", "question": "Which cost model allows different rates for on-demand vs. reserved capacity?", "options": ["Consumption-based", "Tiered model", "Hybrid model", "Custom model"], "correct": 1, "explanation": "Correct answer: B. Tiered models support different rates for on-demand, reserved, and spot-like capacity.", "priority": true, "sectionClean": "4.4 \u2013 Cost Management & Chargeback"}, {"section": "4.4 \u2013 Cost Management & Chargeback", "question": "How are network egress costs typically calculated in chargeback?", "options": ["All traffic is charged equally", "Egress GB \u00d7 rate/GB; ingress is free", "Bidirectional traffic \u00d7 rate/GB", "Flat monthly fee per VM"], "correct": 1, "explanation": "Correct answer: B. Egress (outbound) traffic is charged; ingress is typically free.", "priority": true, "sectionClean": "4.4 \u2013 Cost Management & Chargeback"}, {"section": "4.4 \u2013 Cost Management & Chargeback", "question": "In a multi-tenant environment, how are shared license costs allocated?", "options": ["Equally across all tenants", "Per cluster and distributed by consumption percentage", "Only charged to largest tenant", "Amortized across on-demand VMs only"], "correct": 1, "explanation": "Correct answer: B. Shared licenses are allocated per cluster, then distributed to VMs proportional to their consumption.", "priority": true, "sectionClean": "4.4 \u2013 Cost Management & Chargeback"}, {"section": "4.5 \u2013 VCF Policy Management", "question": "What are the four main types of policies in VCF Operations?", "options": ["Capacity, Compliance, Workload, Configuration", "Capacity, Security, Network, Storage", "Compute, Memory, Disk, Network", "Alert, Action, Remediate, Report"], "correct": 0, "explanation": "Correct answer: A. VCF policies cover capacity planning, compliance, workloads, and configurations.", "priority": true, "sectionClean": "4.5 \u2013 VCF Policy Management"}, {"section": "4.5 \u2013 VCF Policy Management", "question": "Which policy action is new in VCF 9.0 for addressing Configuration Drift?", "options": ["Scale cluster automatically", "Auto-remediate deviations from approved config", "Notify administrators via email", "Delete non-compliant objects"], "correct": 1, "explanation": "Correct answer: B. VCF 9.0 introduces auto-remediation for configuration drift.", "priority": true, "sectionClean": "4.5 \u2013 VCF Policy Management"}, {"section": "4.5 \u2013 VCF Policy Management", "question": "What condition duration is typical for a CPU utilization scaling policy to avoid thrashing?", "options": ["30 seconds", "60 seconds", "300 seconds (5 minutes)", "600 seconds (10 minutes)"], "correct": 2, "explanation": "Correct answer: C. 5-minute sustained threshold prevents rapid scaling in response to temporary spikes.", "priority": true, "sectionClean": "4.5 \u2013 VCF Policy Management"}, {"section": "4.5 \u2013 VCF Policy Management", "question": "In VCF Operations Policy Language (VCPL), how would you express 'memory overhead ratio > 2x'?", "options": ["${metrics['memory.overhead']} > 2", "${properties['memorySizeMB']} / ${metrics['memory.active']} > 2.0", "${memory.utilization} > 2x", "memory_overhead_ratio > 2"], "correct": 1, "explanation": "Correct answer: B. VCPL syntax uses ${properties[...]} and ${metrics[...]} with mathematical operators.", "priority": true, "sectionClean": "4.5 \u2013 VCF Policy Management"}, {"section": "4.5 \u2013 VCF Policy Management", "question": "Can policies be applied with temporal constraints (e.g., business hours only)?", "options": ["No, policies always apply 24/7", "Yes, via schedule definition", "Only for alert policies", "Only via external sc const SECTION_CATEGORIES = {
  "Section 4": [],
};

ALL_QUESTIONS.forEach((q, i) => {
  q.id = i;
  const s = q.sectionClean || q.section;
  let matched = false;
    if (s.startsWith("4.") || s.startsWith("Section 4") || s.startsWith("SECTION 4") || s.startsWith("Objective 4")) SECTION_CATEGORIES["Section 4"].push(s);
  else { let matched = false; for (const k in SECTION_CATEGORIES) { if (SECTION_CATEGORIES[k].length > 0) { matched = true; } } if (!matched) { const firstKey = Object.keys(SECTION_CATEGORIES)[0]; SECTION_CATEGORIES[firstKey].push(s); } }

});

for (const k in SECTION_CATEGORIES) {
  SECTION_CATEGORIES[k] = [...new Set(SECTION_CATEGORIES[k])];
  if (SECTION_CATEGORIES[k].length === 0) delete SECTION_CATEGORIES[k];
}

let examQuestions = [];
let currentIndex = 0;
let answers = {};
let revealed = {};

function buildSetup() {
  const container = document.getElementById('filterGroups');
  container.innerHTML = '';
  for (const [cat, sections] of Object.entries(SECTION_CATEGORIES)) {
    if (!sections || sections.length === 0) continue;
    const group = document.createElement('div');
    group.className = 'filter-group';
    const totalQ = sections.reduce((sum, s) => sum + ALL_QUESTIONS.filter(q => (q.sectionClean || q.section) === s).length, 0);
    group.innerHTML = `<h3>${cat} <span class="badge">${totalQ} questions</span></h3>`;
    const list = document.createElement('div');
    list.className = 'section-list';
    sections.forEach(s => {
      const count = ALL_QUESTIONS.filter(q => (q.sectionClean || q.section) === s).length;
      const isPriority = !s.includes('(STRENGTH)');
      const cleanName = s.replace(' (STRENGTH)', '');
      const id = 'sec_' + s.replace(/[^a-zA-Z0-9]/g, '_');
      const item = document.createElement('div');
      item.className = 'section-item selected';
      item.onclick = (e) => {
        if (e.target.tagName === 'INPUT') return;
        const cb = item.querySelector('input');
        cb.checked = !cb.checked;
        item.classList.toggle('selected', cb.checked);
        updateCount();
      };
      item.innerHTML = `
        <input type="checkbox" id="${id}" data-section="${s}" checked>
        <div class="priority-dot ${('blue')}"></div>
        <label for="${id}">${cleanName}</label>
        <span class="count">${count}q</span>
      `;
      list.appendChild(item);
    });
    group.appendChild(list);
    container.appendChild(group);
  }
  updateCount();
}

function getSelectedSections() {
  return [...document.querySelectorAll('.section-item input:checked')].map(cb => cb.dataset.section);
}

function updateCount() {
  const sections = getSelectedSections();
  const count = ALL_QUESTIONS.filter(q => sections.includes(q.sectionClean || q.section)).length;
  document.getElementById('selectedCount').textContent = count + ' questions selected';
  document.getElementById('startBtn').disabled = count === 0;
}

function selectAll() {
  document.querySelectorAll('.section-item input').forEach(cb => { cb.checked = true; cb.closest('.section-item').classList.add('selected'); });
  updateCount();
}
function selectNone() {
  document.querySelectorAll('.section-item input').forEach(cb => { cb.checked = false; cb.closest('.section-item').classList.remove('selected'); });
  updateCount();
}

function selectPriority() {}
function selectStrength() {}


function startExam() {
  const sections = getSelectedSections();
  examQuestions = ALL_QUESTIONS.filter(q => sections.includes(q.sectionClean || q.section));
  if (document.getElementById('randomizeToggle').checked) {
    for (let i = examQuestions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [examQuestions[i], examQuestions[j]] = [examQuestions[j], examQuestions[i]];
    }
  }
  currentIndex = 0; answers = {}; revealed = {};
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('examScreen').classList.remove('hidden');
  document.getElementById('headerStats').innerHTML = `
    <div class="stat">Questions: <b>${examQuestions.length}</b></div>
    <div class="stat">Answered: <b id="answeredCount">0</b></div>
    <div class="stat">Score: <b id="liveScore">-</b></div>
  `;
  buildQuestionMap(); renderQuestion();
}

function buildQuestionMap() {
  const map = document.getElementById('questionMap');
  map.innerHTML = '';
  examQuestions.forEach((q, i) => {
    const dot = document.createElement('div');
    dot.className = 'q-dot' + (i === currentIndex ? ' current' : '');
    dot.textContent = i + 1;
    dot.onclick = () => { currentIndex = i; renderQuestion(); };
    dot.id = 'qdot_' + i;
    map.appendChild(dot);
  });
}

function updateDot(i) {
  const dot = document.getElementById('qdot_' + i);
  if (!dot) return;
  dot.className = 'q-dot';
  if (i === currentIndex) dot.classList.add('current');
  const qid = examQuestions[i].id;
  if (revealed[qid] !== undefined) {
    dot.classList.add(answers[qid] === examQuestions[i].correct ? 'correct-dot' : 'incorrect-dot');
  } else if (answers[qid] !== undefined) {
    dot.classList.add('answered');
  }
}

function renderQuestion() {
  const q = examQuestions[currentIndex];
  const qid = q.id;
  const isRevealed = revealed[qid] !== undefined;
  const selectedOpt = answers[qid];
  const isPriority = q.priority;
  const cleanSection = q.sectionClean || q.section.replace(' (STRENGTH)', '');
  const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
  let optionsHtml = q.options.map((opt, i) => {
    let cls = 'option';
    if (isRevealed) {
      cls += ' disabled';
      if (i === q.correct) cls += ' correct' + (selectedOpt === i ? '' : ' was-correct');
      else if (i === selectedOpt) cls += ' incorrect';
    } else {
      if (selectedOpt === i) cls += ' selected';
    }
    return `<div class="${cls}" onclick="selectOption(${i})">
      <div class="option-letter">${letters[i]}</div>
      <div class="option-text">${opt}</div>
    </div>`;
  }).join('');
  let explanationHtml = '';
  if (isRevealed) {
    const isCorrect = selectedOpt === q.correct;
    explanationHtml = `<div class="explanation ${isCorrect ? 'correct' : 'incorrect'} show">
      <strong>${isCorrect ? '\u2714 Correct!' : '\u2718 Incorrect'}</strong><br>
      ${q.explanation}
    </div>`;
  }
  document.getElementById('questionContainer').innerHTML = `
    <div class="question-card">
      <div class="question-meta">
        <span class="question-num">Question ${currentIndex + 1} of ${examQuestions.length}</span>
        <span class="question-section ${('section-default')}">
          ${('📘 EXAM TOPIC')} - ${cleanSection}
        </span>
      </div>
      <div class="question-text">${q.question}</div>
      <div class="options">${optionsHtml}</div>
      ${!isRevealed && selectedOpt !== undefined ? `<div style="margin-top:14px;text-align:center;">
        <button class="btn btn-primary btn-small" onclick="checkAnswer()">Check Answer</button>
      </div>` : ''}
      ${explanationHtml}
    </div>
  `;
  const pct = ((currentIndex + 1) / examQuestions.length * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = (currentIndex + 1) + ' / ' + examQuestions.length;
  examQuestions.forEach((_, i) => updateDot(i));
  updateRunningScore();
}

function selectOption(i) {
  const q = examQuestions[currentIndex];
  if (revealed[q.id] !== undefined) return;
  answers[q.id] = i;
  renderQuestion();
}

function checkAnswer() {
  const q = examQuestions[currentIndex];
  if (answers[q.id] === undefined) return;
  revealed[q.id] = true;
  renderQuestion();
  const answeredEl = document.getElementById('answeredCount');
  if (answeredEl) answeredEl.textContent = Object.keys(revealed).length;
}

function updateRunningScore() {
  const total = Object.keys(revealed).length;
  if (total === 0) return;
  const correct = examQuestions.filter(q => revealed[q.id] && answers[q.id] === q.correct).length;
  const pct = Math.round(correct / total * 100);
  const el = document.getElementById('liveScore');
  if (el) {
    el.textContent = correct + '/' + total + ' (' + pct + '%)';
    el.style.color = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
  }
}

function prevQuestion() { if (currentIndex > 0) { currentIndex--; renderQuestion(); } }
function nextQuestion() { if (currentIndex < examQuestions.length - 1) { currentIndex++; renderQuestion(); } }

function finishExam() {
  examQuestions.forEach(q => {
    if (answers[q.id] === undefined) answers[q.id] = -1;
    revealed[q.id] = true;
  });
  showResults();
}

function showResults() {
  document.getElementById('examScreen').classList.add('hidden');
  document.getElementById('resultsScreen').classList.remove('hidden');
  const total = examQuestions.length;
  const correct = examQuestions.filter(q => answers[q.id] === q.correct).length;
  const pct = Math.round(correct / total * 100);
  const pass = pct >= 70;
  document.getElementById('scoreBig').textContent = pct + '%';
  document.getElementById('scoreBig').className = 'score-big ' + (pass ? 'pass' : 'fail');
  document.getElementById('scoreDetail').textContent = correct + ' correct out of ' + total + ' questions - ' + (pass ? 'PASS (>=70%)' : 'FAIL (need >=70%)');
  const sectionScores = {};
  examQuestions.forEach(q => {
    const s = q.sectionClean || q.section;
    if (!sectionScores[s]) sectionScores[s] = { correct: 0, total: 0 };
    sectionScores[s].total++;
    if (answers[q.id] === q.correct) sectionScores[s].correct++;
  });
  const breakdown = document.getElementById('scoreBreakdown');
  breakdown.innerHTML = '';
  for (const [s, data] of Object.entries(sectionScores)) {
    const sPct = Math.round(data.correct / data.total * 100);
    const cls = sPct >= 70 ? 'good' : sPct >= 50 ? 'ok' : 'bad';
    breakdown.innerHTML += `<div class="score-section">
      <span class="name">${s}</span>
      <span class="result ${cls}">${data.correct}/${data.total} (${sPct}%)</span>
    </div>`;
  }
}

function reviewExam() {
  document.getElementById('resultsScreen').classList.add('hidden');
  document.getElementById('reviewScreen').classList.remove('hidden');
  filterReview('all');
}

function filterReview(mode) {
  const container = document.getElementById('reviewContainer');
  container.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
  let filtered = examQuestions;
  if (mode === 'wrong') filtered = examQuestions.filter(q => answers[q.id] !== q.correct);
  if (mode === 'correct') filtered = examQuestions.filter(q => answers[q.id] === q.correct);
  document.getElementById('reviewTitle').textContent = `Review Mode - ${filtered.length} questions`;
  filtered.forEach((q, idx) => {
    const isCorrect = answers[q.id] === q.correct;
    const isPriority = q.priority;
    const cleanSection = q.sectionClean || q.section;
    let optionsHtml = q.options.map((opt, i) => {
      let cls = 'option disabled';
      if (i === q.correct) cls += ' correct';
      else if (i === answers[q.id]) cls += ' incorrect';
      return `<div class="${cls}">
        <div class="option-letter">${letters[i]}</div>
        <div class="option-text">${opt}</div>
      </div>`;
    }).join('');
    container.innerHTML += `<div class="question-card">
      <div class="question-meta">
        <span class="question-num">Q${idx + 1}</span>
        <span class="question-section ${('section-default')}">
          ${('📘')} ${cleanSection}
        </span>
      </div>
      <div class="question-text">${q.question}</div>
      <div class="options">${optionsHtml}</div>
      <div class="explanation ${isCorrect ? 'correct' : 'incorrect'} show">
        <strong>${isCorrect ? '\u2714 Correct!' : '\u2718 Incorrect'}</strong><br>
        ${q.explanation}
      </div>
    </div>`;
  });
}

function backToResults() {
  document.getElementById('reviewScreen').classList.add('hidden');
  document.getElementById('resultsScreen').classList.remove('hidden');
}

function retryWrong() {
  const wrongQuestions = examQuestions.filter(q => answers[q.id] !== q.correct);
  if (wrongQuestions.length === 0) { alert('No wrong answers to retry!'); return; }
  examQuestions = wrongQuestions;
  for (let i = examQuestions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [examQuestions[i], examQuestions[j]] = [examQuestions[j], examQuestions[i]];
  }
  currentIndex = 0; answers = {}; revealed = {};
  document.getElementById('resultsScreen').classList.add('hidden');
  document.getElementById('examScreen').classList.remove('hidden');
  document.getElementById('headerStats').innerHTML = `
    <div class="stat">Questions: <b>${examQuestions.length}</b></div>
    <div class="stat">Answered: <b id="answeredCount">0</b></div>
    <div class="stat">Score: <b id="liveScore">-</b></div>
    <div class="stat" style="color:var(--orange)">Retry Mode</div>
  `;
  buildQuestionMap(); renderQuestion();
}

function resetExam() {
  document.getElementById('resultsScreen').classList.add('hidden');
  document.getElementById('reviewScreen').classList.add('hidden');
  document.getElementById('examScreen').classList.add('hidden');
  document.getElementById('setupScreen').classList.remove('hidden');
  document.getElementById('headerStats').innerHTML = ``;
  answers = {}; revealed = {}; examQuestions = []; currentIndex = 0;
}

document.addEventListener('keydown', (e) => {
  if (document.getElementById('examScreen').classList.contains('hidden')) return;
  if (e.key === 'ArrowLeft') prevQuestion();
  if (e.key === 'ArrowRight') nextQuestion();
  if (e.key === 'Enter') checkAnswer();
  if (['a','b','c','d','e','f'].includes(e.key.toLowerCase())) {
    const idx = e.key.toLowerCase().charCodeAt(0) - 97;
    const q = examQuestions[currentIndex];
    if (idx < q.options.length) selectOption(idx);
  }
});

buildSetup();
</script>
</body>
</html>
